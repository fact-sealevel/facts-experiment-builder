  inputs:
    rcmip_fname:
      # TO DO ADD HELP TEXT
      "rcmip/rcmip-emissions-annual-means-v5-1-0.csv"
    param_fname:
      # TO DO ADD HELP TEXT
      "parameters/fair_ar6_climate_params_v4.0.nc"
  options:
    # Options inherited from top-level metadata: pipeline-id, nsamps, seed, scenario
    cyear_start:
      # TO DO ADD HELP TEXT
