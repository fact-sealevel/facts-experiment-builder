# LARMIP AIS MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used to generate ModuleSchema objects.
# Currently, it is generated by hand. ultimately, we want to move this to live with the
# corresponding containerized facts module repository and be generated semi programmatically.

module_name: "larmip-ais"
container_image: "ghcr.io/fact-sealevel/larmip-ais:latest"
uses_climate_file: true
climate_file_required: true
command: "main"

# Argument specifications
arguments:
  # Top-level metadata arguments
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      help: "Pipeline ID"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
      help: "Emissions scenario name"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      help: "Number of samples"
    - name: "seed"
      type: "int"
      source: "metadata.seed"
      optional: true
      help: "Random seed to use for sampling"
    - name: "baseyear"
      type: "int"
      source: "metadata.baseyear"
      optional: true
      help: "Base year"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      optional: true
      help: "Projection year start"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      optional: true
      help: "Projection year end"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      optional: true
      help: "Projection year step"
    - name: "location-file"
      type: "str"
      source: "metadata.location-file"
      optional: true
      help: "File containing name, id, lat, and lon of points for localization"
      mount:
        container_path: "/mnt/shared_in"

  # Module-specific options
  options:
    - name: "refyear-start"
      type: "int"
      source: "module_inputs.options.refyear_start"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 1850
    - name: "refyear-end"
      type: "int"
      source: "module_inputs.options.refyear_end"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 1900
    - name: "year-start"
      type: "int"
      source: "module_inputs.options.year_start"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 1900
    - name: "year-end"
      type: "int"
      source: "module_inputs.options.year_end"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 2300
    - name: "cyear-start"
      type: "int"
      source: "module_inputs.options.cyear_start"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "cyear-end"
      type: "int"
      source: "module_inputs.options.cyear_end"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      help: "TO DO ADD HELP TEXT"

  fingerprint_params:
    - name: "fingerprint-dir"
      type: "str"
      source: "module_inputs.fingerprint_params.fingerprint_dir"
      help: "TO DO ADD HELP TEXT"
      default_value: FPRINT
      mount:
        volume: "input"
        container_path: "/mnt/shared_in"

  # Input file arguments
  inputs:
    - name: "climate-data-file"
      type: "file"
      source: "module_inputs.inputs.climate_data_file"
      filename: "fair-temperature/climate.nc"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "out" # Implicit dependency: needs fair output
        container_path: "/mnt/out"
        transform: "filename"
      external_volume: true # Indicates this comes from an external module
    - name: "scaling-coefficients-dir"
      type: "str"
      source: "module_inputs.inputs.scaling_coefficients_dir"
      help: "TO DO ADD HELP TEXT"
      default_value: "ScalingCoefficients"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "r-functions-dir"
      type: "str"
      source: "module_inputs.inputs.r_functions_dir"
      help: "TO DO ADD HELP TEXT"
      default_value: "RFunctions"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"

  # Output file arguments
  outputs:
    files:
      - name: "ais-global-output-file"
        type: "file"
        source: "module_inputs.outputs.ais_global_output_file"
        filename: "ais_global_output.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "eais-global-output-file"
        type: "file"
        source: "module_inputs.outputs.eais_global_output_file"
        filename: "eais_global_output.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "wais-global-output-file"
        type: "file"
        source: "module_inputs.outputs.wais_global_output_file"
        filename: "wais_global_output.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "pen-global-output-file"
        type: "file"
        source: "module_inputs.outputs.pen_global_output_file"
        filename: "pen_global_output.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "smb-global-output-file"
        type: "file"
        source: "module_inputs.outputs.smb_global_output_file"
        filename: "smb_global_output.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "wais-local-output-file"
        type: "file"
        source: "module_inputs.outputs.wais_local_output_file"
        filename: "wais_local_output.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true
      - name: "eais-local-output-file"
        type: "file"
        source: "module_inputs.outputs.eais_local_output_file"
        filename: "eais_local_output.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true
      - name: "ais-local-output-file"
        type: "file"
        source: "module_inputs.outputs.ais_local_output_file"
        filename: "ais_local_output.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true

# Volume specifications
volumes:
  module_specific_input:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/module_specific_in"
  shared_input:
    host_path: "module_inputs.input_paths.shared_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/shared_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/out"
