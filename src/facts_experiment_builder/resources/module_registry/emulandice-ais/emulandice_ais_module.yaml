# EMULANDICE AIS (Antarctic Ice Sheet) MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used to generate ModuleSchema objects.
# Based on https://github.com/fact-sealevel/emulandice/blob/main/src/emulandice/cli.py (ais command).

module_name: "emulandice-ais"
container_image: "ghcr.io/fact-sealevel/emulandice:0.1.1"
uses_climate_file: true
climate_file_required: true
command: "ais"

# Argument specifications
arguments:
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      optional: true
      help: "Unique identifier for this instance of the module"
    - name: "baseyear"
      type: "int"
      source: "metadata.baseyear"
      optional: true
      help: "Base year to which projections should be referenced"
    - name: "location-file"
      type: "str"
      source: "metadata.location-file"
      optional: true
      help: "File containing name, id, lat, and lon of points for localization"
      mount:
        container_path: "/mnt/shared_in"

  options:
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      default_value: 50
      help: "Number of locations to process at a time"

  fingerprint_params:
    - name: "fprint-wais-file"
      type: "str"
      source: "module_inputs.fingerprint_params.fprint_wais_file"
      help: "File containing WAIS fingerprint data"
      filename: "FPRINT/fprint_wais.nc"
      mount:
        volume: "shared_input"
        container_path: "/mnt/shared_in"
    - name: "fprint-eais-file"
      type: "str"
      source: "module_inputs.fingerprint_params.fprint_eais_file"
      help: "File containing EAIS fingerprint data"
      filename: "FPRINT/fprint_eais.nc"
      mount:
        volume: "shared_input"
        container_path: "/mnt/shared_in"

  #These names need to exactly match names of cli arguments
  inputs:
    - name: "input-data-file"
      type: "file"
      source: "module_inputs.inputs.input_data_file"
      help: "Full path for temperature trajectory input file"
      filename: "fair-temperature/gsat.nc"
      mount:
        volume: "output"
        container_path: "/mnt/out"
        transform: "filename"
      external_volume: true
    - name: "forcing-head-path"
      type: "file"
      source: "module_inputs.inputs.forcing_head_path"
      envvar: "EMULANDICE_FORCING_HEAD_PATH"
      optional: true
      help: "Path to the climate forcing head CSV file (supplied via EMULANDICE_FORCING_HEAD_PATH env var by the container)"
      mount:
        volume: "module_specific_input"
        container_path: "/mnt/module_specific_in"
  #These names need to exactly match names of cli arguments
  outputs:
    files:
      - name: "output-gslr-file"
        type: "file"
        source: "module_inputs.outputs.output_gslr_file"
        filename: "output-gslr.nc"
        help: "Path to write output global SLR file"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-gslr-wais-file"
        type: "file"
        source: "module_inputs.outputs.output_gslr_wais_file"
        filename: "output-gslr-wais.nc"
        help: "Path to write output global SLR file"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-gslr-eais-file"
        type: "file"
        source: "module_inputs.outputs.output_gslr_eais_file"
        filename: "output-gslr-eais.nc"
        help: "Path to write output global SLR EAIS file"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true
      - name: "output-gslr-pen-file"
        type: "file"
        source: "module_inputs.outputs.output_gslr_pen_file"
        filename: "output-gslr-pen.nc"
        help: "Path to write output global SLR PEN file"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-lslr-file"
        type: "file"
        source: "module_inputs.outputs.output_lslr_file"
        filename: "output-lslr.nc"
        help: "Path to write output local SLR file"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-lslr-eais-file"
        type: "file"
        source: "module_inputs.outputs.output_lslr_eais_file"
        filename: "output-lslr-eais.nc"
        help: "Path to write output local SLR EAIS file"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true
      - name: "output-lslr-wais-file"
        type: "file"
        source: "module_inputs.outputs.output_lslr_wais_file"
        filename: "output-lslr-wais.nc"
        help: "Path to write output local SLR WAIS file"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true

# Volume specifications
volumes:
  module_specific_input:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    help: "Module-specific input directory"
    container_path: "/mnt/module_specific_in"
  shared_input:
    host_path: "module_inputs.input_paths.shared_input_dir"
    help: "Shared input directory (fingerprints, location file)"
    container_path: "/mnt/shared_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "Output directory for SLR files"
    container_path: "/mnt/out"
