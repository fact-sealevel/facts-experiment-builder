# Default values for the EMULANDICE AIS module command (ais)
# These values are used when creating new experiments and can be overridden in experiment metadata

# internal note: Location file defaults DO NOT belong here.

# Module-specific options
options:
  chunksize: 50

inputs:
  input-data-file: "fair-temperature/gsat.nc"
fingerprint_params:
  fprint-wais-file: "FPRINT/fprint_wais.nc"
  fprint-eais-file: "FPRINT/fprint_eais.nc"
