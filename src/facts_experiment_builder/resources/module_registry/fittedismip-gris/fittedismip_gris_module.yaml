# FITTEDISMIP GRIS MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used to generate ModuleSchema objects.
# Currently, it is generated by hand. ultimately, we want to move this to live with the
# corresponding containerized facts module repository and be generated semi programmatically.

module_name: "fittedismip-gris"
container_image: "ghcr.io/fact-sealevel/fittedismip-gris:0.1.2"
uses_climate_file: true
climate_file_required: true
command: "main"

# Argument specifications
arguments:
  # Top-level metadata arguments
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      optional: true
      help: "Pipeline ID"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
      optional: true
      help: "Emissions scenario name"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      optional: true
      help: "Number of samples"
    - name: "baseyear"
      type: "int"
      source: "metadata.baseyear"
      optional: true
      help: "Base year"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      optional: true
      help: "Projection year start"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      optional: true
      help: "Projection year end"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      optional: true
      help: "Projection year step"
    - name: "location-file"
      type: "str"
      source: "metadata.location-file"
      optional: true
      help: "File containing name, id, lat, and lon of points for localization"
      mount:
        container_path: "/mnt/shared_in"

  # Module-specific options
  options:
    - name: "tlm-flag"
      type: "int"
      source: "module_inputs.options.tlm_flag"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 1
    - name: "cyear-start"
      type: "int"
      source: "module_inputs.options.cyear_start"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "cyear-end"
      type: "int"
      source: "module_inputs.options.cyear_end"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 2100
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 50
    - name: "rngseed"
      type: "int"
      source: "module_inputs.options.seed"
      default_value: 1432
      help: "Seed for the random number generator."
  fingerprint_params:
    - name: "fingerprint-dir"
      type: "str"
      source: "module_inputs.fingerprint_params.fingerprint_dir"
      help: "TO DO ADD HELP TEXT"
      default_value: FPRINT
      mount:
        volume: "input"
        container_path: "/mnt/shared_in"
  # Input file arguments
  inputs:
    - name: "climate-data-file"
      type: "file"
      source: "module_inputs.inputs.climate_data_file"
      help: "TO DO ADD HELP TEXT"
      filename: "fair-temperature/climate.nc"
      mount:
        volume: "out" # Implicit dependency: needs fair output
        container_path: "/mnt/out"
        transform: "filename"
      external_volume: true # Indicates this comes from an external module
    - name: "gris-parm-file"
      type: "file"
      source: "module_inputs.inputs.gris_parm_file"
      help: "TO DO ADD HELP TEXT"
      filename: "FittedParms_GrIS_ALL.csv"
      mount:
        volume: "module_specific_input"
        container_path: "/mnt/module_specific_in"
    - name: "wais-parm-file"
      type: "file"
      source: "module_inputs.inputs.wais_parm_file"
      help: "TO DO ADD HELP TEXT"
      filename: "FittedParms_AIS_WAIS.csv"
      mount:
        volume: "module_specific_input"
        container_path: "/mnt/module_specific_in"
    - name: "eais-parm-file"
      type: "file"
      source: "module_inputs.inputs.eais_parm_file"
      help: "TO DO ADD HELP TEXT"
      filename: "FittedParms_AIS_EAIS.csv"
      mount:
        volume: "module_specific_input"
        container_path: "/mnt/module_specific_in"
    - name: "pen-parm-file"
      type: "file"
      source: "module_inputs.inputs.pen_parm_file"
      help: "TO DO ADD HELP TEXT"
      filename: "FittedParms_AIS_PEN.csv"
      mount:
        volume: "module_specific_input"
        container_path: "/mnt/module_specific_in"

  # Output file arguments
  outputs:
    files:
      - name: "gris-global-out-file"
        type: "file"
        source: "module_inputs.outputs.gris_global_out_file"
        filename: "gris-global-out.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "gris-local-out-file"
        type: "file"
        source: "module_inputs.outputs.gris_local_out_file"
        filename: "gris-local-out.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true

# Volume specifications
volumes:
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/out"
  module_specific_input:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/module_specific_in"
  shared_input:
    host_path: "module_inputs.input_paths.shared_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/shared_in"

# Service dependencies are automatically added in generate_compose.py when uses_climate_file: true
