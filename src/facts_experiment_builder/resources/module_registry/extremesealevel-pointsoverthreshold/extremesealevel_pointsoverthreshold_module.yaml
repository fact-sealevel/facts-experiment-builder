# EXTREMESEALEVEL POINTS-OVER-THRESHOLD MODULE CONFIGURATION
# Based on https://github.com/fact-sealevel/extremesealevel-pointsoverthreshold
# Fits GPD on GESLA2 data, uses total module output, generates return curves and allowances.

module_name: "extremesealevel-pointsoverthreshold"
container_image: "ghcr.io/fact-sealevel/extremesealevel-pointsoverthreshold:latest"
uses_climate_file: false
climate_file_required: false
command: "main"

# Argument specifications
arguments:
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      optional: true
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      optional: true
    - name: "target-years"
      type: "str"
      source: "module_inputs.options.target_years"
      optional: true

  options:
    - name: "min-days"
      type: "int"
      source: "module_inputs.options.min_days"
      optional: true
      default_value: 250
    - name: "min-years"
      type: "int"
      source: "module_inputs.options.min_years"
      optional: true
      default_value: 20
    - name: "match-lim"
      type: "float"
      source: "module_inputs.options.match_lim"
      optional: true
      default_value: 0.1
    - name: "center-year"
      type: "int"
      source: "module_inputs.options.center_year"
      optional: true
      default_value: 2000
    - name: "pct-pot"
      type: "int"
      source: "module_inputs.options.pct_pot"
      optional: true
      default_value: 95
    - name: "gpd-pot-threshold"
      type: "float"
      source: "module_inputs.options.gpd_pot_threshold"
      optional: true
      default_value: 99.7
    - name: "cluster-lim"
      type: "int"
      source: "module_inputs.options.cluster_lim"
      optional: true
      default_value: 72
    - name: "min-z"
      type: "float"
      source: "module_inputs.options.min_z"
      optional: true
      default_value: -0.5
    - name: "max-z"
      type: "float"
      source: "module_inputs.options.max_z"
      optional: true
      default_value: 8.0
    - name: "quantile-min"
      type: "float"
      source: "module_inputs.options.quantile_min"
      optional: true
      default_value: 0.01
    - name: "quantile-max"
      type: "float"
      source: "module_inputs.options.quantile_max"
      optional: true
      default_value: 0.99
    - name: "quantile-step"
      type: "float"
      source: "module_inputs.options.quantile_step"
      optional: true
      default_value: 0.01
    - name: "z-step"
      type: "float"
      source: "module_inputs.options.z_step"
      optional: true
    - name: "allowance-freq"
      type: "float"
      source: "module_inputs.options.allowance_freq"
      optional: true
      default_value: 0.01
    - name: "output-dir"
      type: "str"
      source: "module_inputs.module_name"
      mount:
        volume: "output"
        container_path: "/mnt/out"
      optional: true
    - name: "debug"
      type: "bool"
      source: "module_inputs.options.debug"
      optional: true
    - name: "seed"
      type: "int"
      source: "module_inputs.options.seed"
      default_value: 2413
      help: "Seed for the random number generator."

  inputs:
    # Total localized sea-level file (path under output root, e.g. facts-total/wf1_total.nc).
    # Add "total_localsl_file" / "total-localsl-file" to output_root_relative_inputs in the adapter if using relative paths.
    - name: "total-localsl-file"
      type: "file"
      source: "module_inputs.inputs.total_localsl_file"
      mount:
        volume: "output"
        container_path: "/mnt/out"
    - name: "gesla-dir"
      type: "file"
      source: "module_inputs.inputs.gesla_dir"
      mount:
        volume: "module_specific_in"
        container_path: "/mnt/module_specific_in"

  outputs: {}
  # output-dir is provided via options (source: module_inputs.module_name) only to avoid duplicate --output-dir in the command

# Volume specifications (aligned with README: totaled data via output, GESLA via module_specific_in)
volumes:
  module_specific_in:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    container_path: "/mnt/module_specific_in"
  shared_in:
    host_path: "module_inputs.input_paths.shared_input_dir"
    container_path: "/mnt/shared_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    container_path: "/mnt/out"
