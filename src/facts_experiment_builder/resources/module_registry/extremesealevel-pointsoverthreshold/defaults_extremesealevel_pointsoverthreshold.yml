#Default values for the EXTREMESEALEVEL POINTS-OVER-THRESHOLD module command (extremesealevel-pointsoverthreshold)
#These values are used when creating new experiments and can be overridden in experiment metadata

module_name: "extremesealevel-pointsoverthreshold"
container_image: "ghcr.io/fact-sealevel/extremesealevel-pointsoverthreshold:0.1.0"
uses_climate_file: false
climate_file_required: false

options:
  min_days: 250
  min_years: 20
  match_lim: 0.1
  center_year: 2000
  pct_pot: 95
  gpd_pot_threshold: 99.7
  cluster_lim: 72
  target_years: 2100
  min_z: -0.5
  max_z: 8.0
  quantile_min: 0.01
  quantile_max: 0.99
  quantile_step: 0.01
  allowance_freq: 0.01
  gesla_dir: "/Users/emmamarshall/Desktop/facts_work/facts_v2/data/module-specific-inputs/extremesealevel-pointsoverthreshold/gesla_data"


outputs:
  output-dir: "."
