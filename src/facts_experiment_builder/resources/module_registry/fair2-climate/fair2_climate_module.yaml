# FAIR2 CLIMATE MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used to generate ModuleSchema objects.
# Currently, it is generated by hand. ultimately, we want to move this to live with the
# corresponding containerized facts module repository and be generated semi programmatically.

module_name: "fair2-climate"
container_image: "ghcr.io/fact-sealevel/fair2-climate:latest"
climate_file_required: false
uses_climate_file: false
command: "main"

# Argument specifications
arguments:
  # Top-level metadata arguments
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      help: "Pipeline ID"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      help: "Number of samples"
    - name: "seed"
      type: "int"
      source: "metadata.seed"
      help: "Random seed to use for sampling"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
      help: "Emissions scenario name"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      help: "Projection year start"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      help: "Projection year end"

  # Module-specific options
  options:
    - name: "reference-year"
      type: "int"
      source: "module_inputs.options.reference_year"
      optional: true
      help: "Reference year for RCMIP data"
      default_value: 1750
    - name: "cyear-start"
      type: "int"
      source: "module_inputs.options.cyear_start"
      optional: true
      help: "Start year of temporal range for centering"
      default_value: 1850
    - name: "cyear-end"
      type: "int"
      source: "module_inputs.options.cyear_end"
      optional: true
      help: "End year of temporal range for centering"
      default_value: 1900
    - name: "smooth-win"
      type: "int"
      source: "module_inputs.options.smooth_win"
      optional: true
      help: "Number of years to use as a smoothing window"
      default_value: 19

  # Input file arguments
  inputs:
    - name: "rcmip-concentration-file"
      type: "file"
      source: "module_inputs.inputs.rcmip_concentration_fname"
      help: "Path to RCMIP concentrations file"
      filename: "rcmip/rcmip-concentrations-annual-means-v5-1-0.csv"
      mount:
        volume: "module_specific_in"
        container_path: "/mnt/module_specific_in"
    - name: "rcmip-emissions-file"
      type: "file"
      source: "module_inputs.inputs.rcmip_emissions_fname"
      help: "Path to RCMIP emissions file"
      filename: "rcmip/rcmip-emissions-annual-means-v5-1-0.csv"
      mount:
        volume: "module_specific_in"
        container_path: "/mnt/module_specific_in"
    - name: "rcmip-forcing-file"
      type: "file"
      source: "module_inputs.inputs.rcmip_forcing_fname"
      help: "Path to RCMIP radiative forcing file"
      filename: "rcmip/rcmip-radiative-forcing-annual-means-v5-1-0.csv"
      mount:
        volume: "module_specific_in"
        container_path: "/mnt/module_specific_in"
    - name: "calibration-file"
      type: "file"
      source: "module_inputs.inputs.calibration_fname"
      help: "Path to calibrated constrained parameters file"
      filename: "parameters/calibrated_constrained_parameters.csv"
      mount:
        volume: "module_specific_in"
        container_path: "/mnt/module_specific_in"
    - name: "species-config-file"
      type: "file"
      source: "module_inputs.inputs.species_config_fname"
      help: "Path to species configuration properties file"
      filename: "parameters/species_configs_properties_calibration1.2.0.csv"
      mount:
        volume: "module_specific_in"
        container_path: "/mnt/module_specific_in"
    - name: "volcanic-erf"
      type: "file"
      source: "module_inputs.inputs.volcanic_erf_fname"
      help: "Path to volcanic ERF timebounds file"
      filename: "parameters/volcanic_ERF_1750-2101_timebounds.csv"
      mount:
        volume: "module_specific_in"
        container_path: "/mnt/module_specific_in"
    - name: "solar-erf"
      type: "file"
      source: "module_inputs.inputs.solar_erf_fname"
      help: "Path to solar ERF timebounds file"
      filename: "parameters/solar_erf_timebounds.csv"
      mount:
        volume: "module_specific_in"
        container_path: "/mnt/module_specific_in"

  # Output file arguments
  outputs:
    files:
      - name: "output-climate-file"
        type: "file"
        source: "module_inputs.outputs.output_climate_file"
        filename: "climate.nc"
        output_type: "global"
        help: "Output climate file"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-gsat-file"
        type: "file"
        source: "module_inputs.outputs.output_gsat_file"
        filename: "gsat.nc"
        output_type: "global"
        help: "Output GSAT file"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-oceantemp-file"
        type: "file"
        source: "module_inputs.outputs.output_oceantemp_file"
        filename: "ocean_temp.nc"
        output_type: "global"
        help: "Output ocean temperature file"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-ohc-file"
        type: "file"
        source: "module_inputs.outputs.output_ohc_file"
        filename: "ohc.nc"
        output_type: "global"
        help: "Output ocean heat content file"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"

# Volume specifications
volumes:
  module_specific_in:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/module_specific_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/out"
