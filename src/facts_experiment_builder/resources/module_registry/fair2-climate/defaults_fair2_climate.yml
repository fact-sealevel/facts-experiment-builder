# Default values for the FAIR2 climate module
# These values are used when creating new experiments and can be overridden in experiment metadata

# internal note: Image information and Location file defaults DO NOT belong here.

# Module-specific options
options:
  reference_year: 1750
  cyear_start: 1850
  cyear_end: 1900
  smooth_win: 19

# Input paths
inputs:
  rcmip_concentration_fname: "rcmip/rcmip-concentrations-annual-means-v5-1-0.csv"
  rcmip_emissions_fname: "rcmip/rcmip-emissions-annual-means-v5-1-0.csv"
  rcmip_forcing_fname: "rcmip/rcmip-radiative-forcing-annual-means-v5-1-0.csv"
  calibration_fname: "parameters/calibrated_constrained_parameters.csv"
  species_config_fname: "parameters/species_configs_properties_calibration1.2.0.csv"
  volcanic_erf_fname: "parameters/volcanic_ERF_1750-2101_timebounds.csv"
  solar_erf_fname: "parameters/solar_erf_timebounds.csv"
