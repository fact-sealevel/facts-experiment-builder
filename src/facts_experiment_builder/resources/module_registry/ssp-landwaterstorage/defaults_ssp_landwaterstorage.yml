# Default values for the SSP LANDWATERSTORAGE module
# These values are used when creating new experiments and can be overridden in experiment metadata

# internal note: Location file defaults DO NOT belong here.
options:
  dotriangular: false
  chunksize: 50
  dcyear_start: 2020
  dcyear_end: 2040
  dcrate_lo: 0.0
  dcrate_hi: 0.0


inputs:
  pophist_file: UNWPP2012_population_historical.csv
  reservoir_file: Chao2008_groundwater_impoundment.csv
  popscen_file: ssp_iam_baseline_popscenarios2100.csv
  gwd_file:
    - Konikow2011_GWD.csv
    - Wada2012_GWD.csv
    - Pokhrel2012_GWD.csv
  fp_file: REL_GROUNDWATER_NOMASK.nc
  