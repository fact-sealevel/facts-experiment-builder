# SSP LANDWATERSTORAGE MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used to generate ModuleSchema objects.
# Currently, it is generated by hand. ultimately, we want to move this to live with the
# corresponding containerized facts module repository and be generated semi programmatically.

module_name: "ssp-landwaterstorage"
container_image: "ghcr.io/fact-sealevel/ssp-landwaterstorage:latest"
uses_climate_file: false
climate_file_required: false
command: "main"

# Argument specifications
arguments:
  # Top-level metadata arguments
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      help: "Pipeline ID"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      optional: true
      help: "Number of samples"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name_ssp_landwaterstorage"
      optional: true
      help: "Emissions scenario name (mapped from common name via scenario_name_mapping_ssp_landwaterstorage.yaml)"
    - name: "baseyear"
      type: "int"
      source: "metadata.baseyear"
      optional: true
      help: "Base year"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      optional: true
      help: "Projection year start"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      optional: true
      help: "Projection year end"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      optional: true
      help: "Projection year step"
    - name: "location-file"
      type: "str"
      source: "metadata.location-file"
      optional: true
      help: "File containing name, id, lat, and lon of points for localization"
      mount:
        container_path: "/mnt/shared_in"

  # Module-specific options
  options:
    - name: "dotriangular"
      type: "bool"
      source: "module_inputs.options.dotriangular"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: False
    - name: "dcyear-start"
      type: "int"
      source: "module_inputs.options.dcyear_start"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 2020
    - name: "dcyear-end"
      type: "int"
      source: "module_inputs.options.dcyear_end"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 2040
    - name: "dcrate-lo"
      type: "float"
      source: "module_inputs.options.dcrate_lo"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 0.0
    - name: "dcrate-hi"
      type: "float"
      source: "module_inputs.options.dcrate_hi"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 0.0
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: 50
    - name: "seed"
      type: "int"
      source: "module_inputs.options.seed"
      default_value: 1243
      help: "Seed for the random number generator."

  fingerprint_params:
    - name: "fp-file"
      type: "str"
      source: "module_inputs.fingerprint_params.fingerprint_dir"
      help: "TO DO ADD HELP TEXT"
      filename: REL_GROUNDWATER_NOMASK.nc
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
  # Input file arguments
  inputs:
    - name: "pophist-file"
      type: "file"
      source: "module_inputs.inputs.pophist_file"
      help: "TO DO ADD HELP TEXT"
      filename: "UNWPP2012_population_historical.csv"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "reservoir-file"
      type: "file"
      source: "module_inputs.inputs.reservoir_file"
      help: "TO DO ADD HELP TEXT"
      filename: "Chao2008_groundwater_impoundment.csv"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "popscen-file"
      type: "file"
      source: "module_inputs.inputs.popscen_file"
      help: "TO DO ADD HELP TEXT"
      filename: "ssp_iam_baseline_popscenarios2100.csv"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "gwd-file"
      type: "file"
      source: "module_inputs.inputs.gwd_file"
      help: "TO DO ADD HELP TEXT"
      filename: [Konikow2011_GWD.csv, Wada2012_GWD.csv]
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
      multiple: true # Can be specified multiple times
    - name: "fp-file" ## TODO: SSP LWS uses its own fingerprint file so dont use the standard one
      type: "file" ## but may still want to change how this is handled.
      source: "module_inputs.inputs.fp_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
  # Output file arguments
  outputs:
    files:
      - name: "output-gslr-file"
        type: "file"
        source: "module_inputs.outputs.output_gslr_file"
        filename: "gslr.nc"
        output_type: "global"
        help: "TO DO ADD HELP TEXT"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-lslr-file"
        type: "file"
        source: "module_inputs.outputs.output_lslr_file"
        filename: "lslr.nc"
        output_type: "local"
        help: "TO DO ADD HELP TEXT"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"

# Volume specifications
volumes:
  module_specific_input:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/module_specific_in"
  shared_input:
    host_path: "module_inputs.input_paths.shared_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/shared_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/out"
