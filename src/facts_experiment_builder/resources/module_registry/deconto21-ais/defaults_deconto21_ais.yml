# Default values for the Deconto21 AIS module
# These values are used when creating new experiments and can be overridden in experiment metadata

# internal note: Image information and Location file defaults DO NOT belong here.

options:
  replace: true
  chunksize: 50
fingerprint_params:
  fingerprint-dir: FPRINT
inputs:
  input-eais-rcp26-file: "dp21_eais_rcp26.nc"
  input-eais-rcp45-file: "dp21_eais_rcp45.nc"
  input-eais-rcp85-file: "dp21_eais_rcp85.nc"
  input-wais-rcp26-file: "dp21_wais_rcp26.nc"
  input-wais-rcp45-file: "dp21_wais_rcp45.nc"
  input-wais-rcp85-file: "dp21_wais_rcp85.nc"
