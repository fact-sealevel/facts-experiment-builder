# DECONTO21 AIS MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used to generate ModuleSchema objects.
# Currently, it is generated by hand. ultimately, we want to move this to live with the
# corresponding containerized facts module repository and be generated semi programmatically.

module_name: "deconto21-ais"
container_image: "ghcr.io/fact-sealevel/deconto21-ais:latest"
uses_climate_file: false
climate_file_required: false
command: "main"
# Argument specifications
arguments:
  # Top-level metadata arguments
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
      optional: true
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      optional: true
    - name: "baseyear"
      type: "int"
      source: "metadata.baseyear"
      optional: true
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      optional: true
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      optional: true
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      optional: true
    - name: "location-file"
      type: "str"
      source: "metadata.location-file"
      optional: true
      help: "File containing name, id, lat, and lon of points for localization"
      mount:
        container_path: "/mnt/shared_in"

  # Module-specific options
  options:
    - name: "replace"
      type: "bool"
      source: "module_inputs.options.replace"
      optional: true
      default_value: true
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      default_value: 50
    - name: "rngseed"
      type: "int"
      source: "module_inputs.options.seed"
      default_value: 1342
      help: "Seed for the random number generator."

  fingerprint_params:
    - name: "fingerprint-dir"
      type: "str"
      source: "module_inputs.fingerprint_params.fingerprint_dir"
      help: "TO DO ADD HELP TEXT"
      default_value: FPRINT
      mount:
        volume: "input"
        container_path: "/mnt/shared_in"

  # Input file arguments
  inputs:
    - name: "input-eais-rcp26-file"
      type: "file"
      source: "module_inputs.inputs.input_eais_rcp26_file"
      filename: "dp21_eais_rcp26.nc"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "input-eais-rcp45-file"
      type: "file"
      source: "module_inputs.inputs.input_eais_rcp45_file"
      filename: "dp21_eais_rcp45.nc"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "input-eais-rcp85-file"
      type: "file"
      source: "module_inputs.inputs.input_eais_rcp85_file"
      filename: "dp21_eais_rcp85.nc"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "input-wais-rcp26-file"
      type: "file"
      source: "module_inputs.inputs.input_wais_rcp26_file"
      filename: "dp21_wais_rcp26.nc"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "input-wais-rcp45-file"
      type: "file"
      source: "module_inputs.inputs.input_wais_rcp45_file"
      filename: "dp21_wais_rcp45.nc"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "input-wais-rcp85-file"
      type: "file"
      source: "module_inputs.inputs.input_wais_rcp85_file"
      filename: "dp21_wais_rcp85.nc"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
  # Output file arguments
  outputs:
    files:
      - name: "output-ais-gslr-file"
        type: "file"
        source: "module_inputs.outputs.output_ais_gslr_file"
        filename: "ais-gslr.nc"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-eais-gslr-file"
        type: "file"
        source: "module_inputs.outputs.output_eais_gslr_file"
        filename: "eais-gslr.nc"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-wais-gslr-file"
        type: "file"
        source: "module_inputs.outputs.output_wais_gslr_file"
        filename: "wais-gslr.nc"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-ais-lslr-file"
        type: "file"
        source: "module_inputs.outputs.output_ais_lslr_file"
        filename: "ais-lslr.nc"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true
      - name: "output-eais-lslr-file"
        type: "file"
        source: "module_inputs.outputs.output_eais_lslr_file"
        filename: "eais-lslr.nc"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true
      - name: "output-wais-lslr-file"
        type: "file"
        source: "module_inputs.outputs.output_wais_lslr_file"
        filename: "wais-lslr.nc"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true

# Volume specifications
volumes:
  module_specific_in:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    container_path: "/mnt/module_specific_in"
  shared_in:
    host_path: "module_inputs.input_paths.shared_input_dir"
    container_path: "/mnt/shared_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    container_path: "/mnt/out"
