# TLM STERODYNAMICS MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used to generate ModuleSchema objects.
# Currently, it is generated by hand. ultimately, we want to move this to live with the
# corresponding containerized facts module repository and be generated semi programmatically.

module_name: "tlm-sterodynamics"
container_image: "ghcr.io/fact-sealevel/tlm-sterodynamics:latest"
uses_climate_file: true
climate_file_required: true
command: "main"

# Argument specifications
arguments:
  # Top-level metadata arguments
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      help: "Pipeline ID"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      optional: true
      help: "Number of samples"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
      help: "Emissions scenario name"
    - name: "baseyear"
      type: "int"
      source: "metadata.baseyear"
      optional: true
      help: "Base year"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      optional: true
      help: "Projection year start"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      optional: true
      help: "Projection year end"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      optional: true
      help: "Projection year step"
    - name: "location-file"
      type: "str"
      source: "metadata.location-file"
      optional: true
      help: "File containing name, id, lat, and lon of points for localization"
      mount:
        container_path: "/mnt/shared_in"

  # Module-specific options
  options:
    - name: "scenario-dsl"
      type: "str"
      source: "module_inputs.options.scenario_dsl"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "no-drift-corr"
      type: "bool"
      source: "module_inputs.options.no_drift_corr"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: false
    - name: "no-correlation"
      type: "bool"
      source: "module_inputs.options.no_correlation"
      optional: true
      help: "TO DO ADD HELP TEXT"
      default_value: false
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "debug"
      type: "bool"
      source: "module_inputs.options.debug"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "seed"
      type: "int"
      source: "module_inputs.options.seed"
      default_value: 4321
      help: "Seed for the random number generator."

  # Input file arguments
  inputs:
    - name: "climate-data-file"
      type: "file"
      source: "module_inputs.inputs.climate_data_file"
      filename: "fair-temperature/climate.nc"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "output" # Implicit dependency: needs fair output
        container_path: "/mnt/out"
        transform: "filename"
      external_volume: true # Indicates this comes from an external module
    - name: "model-dir"
      type: "str"
      source: "module_inputs.inputs.model_dir"
      help: "TO DO ADD HELP TEXT"
      default_value: "cmip6/"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "expansion-coefficients-file"
      type: "file"
      source: "module_inputs.inputs.expansion_coefficients_file"
      help: "TO DO ADD HELP TEXT"
      filename: "scmpy2LM_RCMIP_CMIP6calpm_n18_expcoefs.nc"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "gsat-rmses-file"
      type: "file"
      source: "module_inputs.inputs.gsat_rmses_file"
      help: "TO DO ADD HELP TEXT"
      filename: "scmpy2LM_RCMIP_CMIP6calpm_n17_gsat_rmse.nc"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"

  # Output file arguments
  outputs:
    files:
      - name: "output-gslr-file"
        type: "file"
        source: "module_inputs.outputs.output_gslr_file"
        filename: "gslr.nc"
        output_type: "global"
        help: "TO DO ADD HELP TEXT"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-lslr-file"
        type: "file"
        source: "module_inputs.outputs.output_lslr_file"
        filename: "lslr.nc"
        output_type: "local"
        help: "TO DO ADD HELP TEXT"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"

# Volume specifications
volumes:
  module_specific_input:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/module_specific_in"
  shared_input:
    host_path: "module_inputs.input_paths.shared_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/shared_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/out"
