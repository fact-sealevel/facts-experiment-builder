# BAMBER19 ICESHEETS MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used to generate ModuleSchema objects.
# Currently, it is generated by hand. ultimately, we want to move this to live with the
# corresponding containerized facts module repository and be generated semi programmatically.

module_name: "bamber19-icesheets"
container_image: "ghcr.io/fact-sealevel/bamber19-icesheets:latest"
uses_climate_file: true
climate_file_required: false
command: "main"
# Argument specifications
arguments:
  # Top-level metadata arguments
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
    - name: "rngseed"
      type: "int"
      source: "metadata.seed"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
    - name: "baseyear"
      type: "int"
      source: "metadata.baseyear"
    - name: "location-file"
      type: "str"
      source: "metadata.location-file"
      optional: true
      help: "File containing name, id, lat, and lon of points for localization"
      mount:
        container_path: "/mnt/shared_in"

  # Module-specific options
  options:
    - name: "replace"
      type: "int"
      source: "module_inputs.options.replace"
      default_value: 1
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      default_value: 50
      optional: true

  fingerprint_params:
    - name: "fingerprint-dir"
      type: "str"
      source: "module_inputs.fingerprint_params.fingerprint_dir"
      help: "TO DO ADD HELP TEXT"
      default_value: "FPRINT"
      mount:
        volume: "input"
        container_path: "/mnt/shared_in"

  # Input file arguments
  inputs:
    - name: "climate-data-file"
      type: "file"
      source: "module_inputs.inputs.climate_data_file"
      filename: "fair-temperature/climate.nc"
      mount:
        volume: "output"
        container_path: "/mnt/out"
        transform: "filename" # Extract just filename
      external_volume: true # Indicates this comes from an external module
    - name: "slr-proj-mat-file"
      type: "file"
      source: "module_inputs.inputs.slr_proj_mat_file"
      filename: "SLRProjections190726core_SEJ_full.mat"
      mount:
        volume: "module_specific_input"
        container_path: "/mnt/module_specific_in"

  # Output file arguments
  outputs:
    files:
      - name: "output-AIS-gslr-file"
        type: "file"
        source: "module_inputs.outputs.output-AIS-gslr-file"
        filename: "AIS-gslr.nc"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-EAIS-gslr-file"
        type: "file"
        source: "module_inputs.outputs.output-EAIS-gslr-file"
        filename: "EAIS-gslr.nc"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-WAIS-gslr-file"
        type: "file"
        source: "module_inputs.outputs.output-WAIS-gslr-file"
        filename: "WAIS-gslr.nc"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-GIS-gslr-file"
        type: "file"
        source: "module_inputs.outputs.output-GIS-gslr-file"
        filename: "GIS-gslr.nc"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-AIS-lslr-file"
        type: "file"
        source: "module_inputs.outputs.output-AIS-lslr-file"
        filename: "AIS-lslr.nc"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-EAIS-lslr-file"
        type: "file"
        source: "module_inputs.outputs.output-EAIS-lslr-file"
        filename: "EAIS-lslr.nc"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-WAIS-lslr-file"
        type: "file"
        source: "module_inputs.outputs.output-WAIS-lslr-file"
        filename: "WAIS-lslr.nc"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-GIS-lslr-file"
        type: "file"
        source: "module_inputs.outputs.output-GIS-lslr-file"
        filename: "GIS-lslr.nc"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"

# Volume specifications
volumes:
  module_specific_input:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    container_path: "/mnt/module_specific_in"
  shared_input:
    host_path: "module_inputs.input_paths.shared_input_dir"
    container_path: "/mnt/shared_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    container_path: "/mnt/out"
