# IPCC AR5 GLACIERS MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used to generate ModuleSchema objects.
# Currently, it is generated by hand. ultimately, we want to move this to live with the
# corresponding containerized facts module repository and be generated semi programmatically.

module_name: "ipccar5-glaciers"
container_image: "ghcr.io/fact-sealevel/ipccar5:latest"
uses_climate_file: true
climate_file_required: true
command: "glaciers" # Specify which command to run
input_dir_name: "ipccar5" # Both ipccar5-* modules share one input directory

# Argument specifications
arguments:
  # Top-level metadata arguments
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      optional: true
      help: "Pipeline ID"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
      optional: true
      help: "Emissions scenario name"
    - name: "rng-seed"
      type: "int"
      source: "metadata.seed"
      optional: true
      help: "Seed value for random number generator"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      optional: true
      help: "Projection start year"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      optional: true
      help: "Projection end year"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      optional: true
      help: "Projection year step"
    - name: "start-year"
      type: "int"
      source: "metadata.baseyear"
      optional: true
      help: "Year from which to start integrating temperature"
    - name: "location-file"
      type: "str"
      source: "metadata.location-file"
      optional: true
      help: "File containing name, id, lat, and lon of points for localization"
      mount:
        container_path: "/mnt/shared_in"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      optional: false
      help: "Total number of samples to generate"

  # Module-specific options
  options:
    - name: "refyear-start"
      type: "int"
      source: "module_inputs.options.refyear_start"
      optional: true
      default_value: 1986
      help: "Start year for reference period"
    - name: "refyear-end"
      type: "int"
      source: "module_inputs.options.refyear_end"
      optional: true
      help: "End year for reference period"
      default_value: 2005
    - name: "end-year"
      type: "int"
      source: "module_inputs.options.end_year"
      optional: true
      help: "Year to end the projection (Used in preprocess)"
      default_value: 2301
    - name: "tlm-flag"
      type: "int"
      source: "module_inputs.options.tlm_flag"
      optional: true
      help: "Use the two-layer model data, 1=yes"
      default_value: 1
    - name: "use-gmip"
      type: "int"
      source: "module_inputs.options.use_gmip"
      optional: true
      help: "Use the GMIP calibration"
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      help: "Number of locations to process at a time"
      default_value: 50
    - name: "ntsamps"
      type: "int"
      source: "module_inputs.options.ntsamps"
      optional: true
      help: "By-passed if nsamps passed at experiment level"
    - name: "nmsamps"
      type: "int"
      source: "module_inputs.options.nmsamps"
      optional: true
      help: "By-passed if nsamps passed at experiment level"

  fingerprint_params:
    - name: "fingerprint-dir"
      type: "str"
      source: "module_inputs.fingerprint_params.fingerprint_dir"
      help: "TO DO ADD HELP TEXT"
      default_value: FPRINT
      mount:
        volume: "input"
        container_path: "/mnt/shared_in"
  # Input file arguments
  inputs:
    - name: "climate-data-file"
      type: "file"
      source: "module_inputs.inputs.climate_data_file"
      help: "NetCDF4/HDF5 file containing surface temperature data (this should be a fair output)"
      filename: "fair-temperature/climate.nc"
      mount:
        volume: "output" # Implicit dependency: needs fair output
        container_path: "/mnt/out"
        transform: "filename"
      external_volume: true # Indicates this comes from an external module
    - name: "glacier-fraction-file"
      type: "file"
      source: "module_inputs.inputs.glacier_fraction_file"
      help: "Path to glacier fraction file"
      filename: glacier_fraction.txt
      mount:
        volume: "module_specific_input"
        container_path: "/mnt/module_specific_in"

  # Output file arguments
  outputs:
    files:
      - name: "global-output-file"
        type: "file"
        source: "module_inputs.outputs.global_output_file"
        filename: "global-output.nc"
        help: "Path to global output sea-level file"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "local-output-file"
        type: "file"
        source: "module_inputs.outputs.local_output_file"
        filename: "local-output.nc"
        help: "Path to local output sea-level file"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true

# Volume specifications
volumes:
  module_specific_input:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/module_specific_in"
  shared_input:
    host_path: "module_inputs.input_paths.shared_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/shared_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/out"
