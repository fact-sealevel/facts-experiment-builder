# IPCC AR5 ICESHEETS MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used to generate ModuleSchema objects.
# Currently, it is generated by hand. ultimately, we want to move this to live with the
# corresponding containerized facts module repository and be generated semi programmatically.

module_name: "ipccar5-icesheets"
container_image: "ghcr.io/fact-sealevel/ipccar5:0.1.2"
uses_climate_file: true
climate_file_required: true
command: "icesheets" # Specify which command to run
input_dir_name: "ipccar5" # Both ipccar5-* modules share one input directory

# Argument specifications
arguments:
  # Top-level metadata arguments
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      optional: true
      help: "Pipeline ID"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
      optional: true
      help: "Emissions scenario name"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      optional: true
      help: "Projection start year"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      optional: true
      help: "Projection end year"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      optional: true
      help: "Projection year step"
    - name: "start-year"
      type: "int"
      source: "metadata.baseyear"
      optional: true
      help: "Year from which to start integrating temperature"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      optional: false
      help: "Total number of samples to generate"
    - name: "location-file"
      type: "str"
      source: "metadata.location-file"
      optional: true
      help: "File containing name, id, lat, and lon of points for localization"
      mount:
        container_path: "/mnt/shared_in"

  # Module-specific options
  options:
    - name: "refyear-start"
      type: "int"
      source: "module_inputs.options.refyear_start"
      optional: true
      help: "Start year for reference period"
      default_value: 1986
    - name: "refyear-end"
      type: "int"
      source: "module_inputs.options.refyear_end"
      optional: true
      help: "End year for reference period"
      default_value: 2005
    - name: "tlm-flag"
      type: "int"
      source: "module_inputs.options.tlm_flag"
      optional: true
      help: "Use the two-layer model data, 1=yes"
      default_value: 1
    - name: "nsamps"
      type: "int"
      source: "module_inputs.options.nsamps"
      optional: true
      help: "Total number of samples to generate (replaces 'nmsamps' and 'ntsamps' if provided)"
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      help: "Number of locations to process at a time"
    - name: "rng-seed"
      type: "int"
      source: "module_inputs.options.seed"
      default_value: 1423
      help: "Seed for the random number generator."

  fingerprint_params:
    - name: "fingerprint-dir"
      type: "str"
      source: "module_inputs.fingerprint_params.fingerprint_dir"
      help: "TO DO ADD HELP TEXT"
      default_value: FPRINT
      mount:
        volume: "input"
        container_path: "/mnt/shared_in"
  # Input file arguments
  inputs:
    - name: "climate-data-file"
      type: "file"
      source: "module_inputs.inputs.climate_data_file"
      help: "NetCDF4/HDF5 file containing surface temperature data (this should be a fair output)"
      filename: "fair-temperature/climate.nc"
      mount:
        volume: "output" # Implicit dependency: needs fair output
        container_path: "/mnt/out"
        transform: "filename"
      external_volume: true # Indicates this comes from an external module
    - name: "icesheet-fraction-file"
      type: "file"
      source: "module_inputs.inputs.icesheet_fraction_file"
      help: "Path to icesheet fraction file"
      filename: icesheet_fraction.txt
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"

  # Output file arguments
  outputs:
    files:
      - name: "global-gis-output-file"
        type: "file"
        source: "module_inputs.outputs.global_gis_output_file"
        filename: "global-gis-output.nc"
        help: "Path to global GIS output sea-level file"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "global-ais-output-file"
        type: "file"
        source: "module_inputs.outputs.global_ais_output_file"
        filename: "global-ais-output.nc"
        help: "Path to global AIS output sea-level file"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "global-wais-output-file"
        type: "file"
        source: "module_inputs.outputs.global_wais_output_file"
        filename: "global-wais-output.nc"
        help: "Path to global WAIS output sea-level file"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "global-eais-output-file"
        type: "file"
        source: "module_inputs.outputs.global_eais_output_file"
        filename: "global-eais-output.nc"
        help: "Path to global EAIS output sea-level file"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "local-gis-output-file"
        type: "file"
        source: "module_inputs.outputs.local_gis_output_file"
        filename: "local-gis-output.nc"
        help: "Path to local GIS output sea-level file"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true
      - name: "local-ais-output-file"
        type: "file"
        source: "module_inputs.outputs.local_ais_output_file"
        filename: "local-ais-output.nc"
        help: "Path to local AIS output sea-level file"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true
      - name: "local-wais-output-file"
        type: "file"
        source: "module_inputs.outputs.local_wais_output_file"
        filename: "local-wais-output.nc"
        help: "Path to local WAIS output sea-level file"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true
      - name: "local-eais-output-file"
        type: "file"
        source: "module_inputs.outputs.local_eais_output_file"
        filename: "local-eais-output.nc"
        help: "Path to local EAIS output sea-level file"
        output_type: "local"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
        optional: true

# Volume specifications
volumes:
  module_specific_input:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/module_specific_in"
  shared_input:
    host_path: "module_inputs.input_paths.shared_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/shared_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/out"
