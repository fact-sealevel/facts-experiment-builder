# Default values for the FAIR temperature module
# These values are used when creating new experiments and can be overridden in experiment metadata

# Module-specific options
options:
  cyear_start: 1850
  cyear_end: 1900
  smooth_win: 19

# Input paths
inputs:
  rcmip_fname: "rcmip/rcmip-emissions-annual-means-v5-1-0.csv"
  param_fname: "parameters/fair_ar6_climate_params_v4.0.nc"

# Container image
image:
  image_url: "ghcr.io/fact-sealevel/fair-temperature:0.2.1"
  image_tag: "0.2.1"

