# FAIR MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used to generate ModuleSchema objects.
# Currently, it is generated by hand. ultimately, we want to move this to live with the
# corresponding containerized facts module repository and be generated semi programmatically.

module_name: "fair-temperature"
container_image: "ghcr.io/fact-sealevel/fair-temperature:latest"
climate_file_required: false
uses_climate_file: false
command: "main"

# Argument specifications
arguments:
  # Top-level metadata arguments
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      help: "Pipeline ID"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      help: "Number of samples"
    - name: "seed"
      type: "int"
      source: "metadata.seed"
      help: "Random seed to use for sampling"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name" # Extract from ScenarioConfig object
      help: "Emissions scenario name"

  # Module-specific options
  options:
    - name: "cyear-start"
      type: "int"
      source: "module_inputs.inputs.cyear_start"
      help: "TO DO ADD HELP TEXT"
    - name: "cyear-end"
      type: "int"
      source: "module_inputs.inputs.cyear_end"
      help: "TO DO ADD HELP TEXT"
    - name: "smooth-win"
      type: "int"
      source: "module_inputs.inputs.smooth_win"
      help: "TO DO ADD HELP TEXT"
  # Input file arguments
  inputs:
    - name: "rcmip-file"
      type: "file"
      source: "module_inputs.inputs.rcmip_fname"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "module_specific_in"
        container_path: "/mnt/module_specific_in"
    - name: "param-file"
      type: "file"
      source: "module_inputs.inputs.param_fname"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "module_specific_in"
        container_path: "/mnt/module_specific_in"
  # Output file arguments
  outputs:
    files:
      - name: "output-oceantemp-file"
        type: "file"
        source: "module_inputs.outputs.output_0" # First output (oceantemp)
        filename: "oceantemp.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-climate-file"
        type: "file"
        source: "module_inputs.outputs.output_1" # Second output (climate)
        filename: "climate.nc"
        output_type: "global"
        help: "TO DO ADD HELP TEXT"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-ohc-file"
        type: "file"
        source: "module_inputs.outputs.output_2" # Third output (ohc)
        filename: "ohc.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"
      - name: "output-gsat-file"
        type: "file"
        source: "module_inputs.outputs.output_3" # Fourth output (gsat)
        filename: "gsat.nc"
        help: "TO DO ADD HELP TEXT"
        output_type: "global"
        mount:
          volume: "output"
          container_path: "/mnt/out"
          transform: "filename"

# Volume specifications
volumes:
  module_specific_in:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/module_specific_in"
  general_in:
    host_path: "module_inputs.input_paths.shared_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/general_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/out"
