# FACTS TOTAL MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used by the generic module system to generate Docker Compose services.

module_name: "facts-total"
container_image: "ghcr.io/fact-sealevel/facts-total:v0.1.2"
climate_file_required: false

# Argument specifications
arguments:
  # Top-level metadata arguments (inherited from experiment metadata)
  top_level:
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"

  # Module-specific options
  options:
    - name: "name"
      type: "str"
      source: "module_inputs.options.name"
      optional: true

  fingerprint_params:
    - name: "fingerprint-dir"
      type: "str"
      source: "module_inputs.fingerprint_params.fingerprint_dir"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/general_in"
    - name: "location-file"
      type: "str"
      source: "module_inputs.fingerprint_params.location_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/general_in"

  # Input file arguments
  # Note: --item can be specified multiple times
  inputs:
    - name: "item"
      type: "file"
      source: "module_inputs.inputs.item"
      mount:
        volume: "input"
        container_path: "/mnt/total_in"
      multiple: true  # Can be specified multiple times

  # Output file arguments
  outputs:
    - name: "output-path"
      type: "file"
      source: "module_inputs.outputs.output_path"
      filename: "total.nc"
      mount:
        volume: "output"
        container_path: "/mnt/total_out"
        transform: "filename"

# Volume specifications (derived from input/output paths)
volumes:
  output:
    host_path: "module_inputs.output_paths.output_dir"
    container_path: "/mnt/total_out"

# Service dependencies
# Note: facts-total depends on other modules' outputs, but these are handled
# through volume mounts from external modules rather than explicit depends_on
# The items are typically outputs from other sea level component modules