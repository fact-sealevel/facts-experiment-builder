# TLM STERODYNAMICS MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used by the generic module system to generate Docker Compose services.

module_name: "tlm-sterodynamics"
container_image: "ghcr.io/fact-sealevel/tlm-sterodynamics:latest"
uses_climate_file: true
climate_file_required: true

# Argument specifications
arguments:
  # Top-level metadata arguments (inherited from experiment metadata)
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      help: "Pipeline ID"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      optional: true
      help: "Number of samples"
    - name: "seed"
      type: "int"
      source: "metadata.seed"
      optional: true
      help: "Random seed to use for sampling"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
      help: "Emissions scenario name"
    - name: "baseyear"
      type: "int"
      source: "metadata.baseyear"
      optional: true
      help: "Base year"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      optional: true
      help: "Projection year start"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      optional: true
      help: "Projection year end"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      optional: true
      help: "Projection year step"

  # Module-specific options
  options:
    - name: "scenario-dsl"
      type: "str"
      source: "module_inputs.options.scenario_dsl"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "no-drift-corr"
      type: "bool"
      source: "module_inputs.options.no_drift_corr"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "no-correlation"
      type: "bool"
      source: "module_inputs.options.no_correlation"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "debug"
      type: "bool"
      source: "module_inputs.options.debug"
      optional: true
      help: "TO DO ADD HELP TEXT"

  fingerprint_params:
    - name: "fingerprint-dir"
      type: "str"
      source: "module_inputs.fingerprint_params.fingerprint_dir"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/general_in"
    - name: "location-file"
      type: "str"
      source: "module_inputs.fingerprint_params.location_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/general_in"

  # Input file arguments
  inputs:
    - name: "climate-data-file"
      type: "file"
      source: "module_inputs.inputs.climate_data_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "out"  # Implicit dependency: needs fair output
        container_path: "/mnt/out"
        transform: "filename"
      external_volume: true  # Indicates this comes from an external module
    - name: "location-file"
      type: "file"
      source: "module_inputs.inputs.location_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/general_in"
    - name: "model-dir"
      type: "str"
      source: "module_inputs.inputs.model_dir"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "expansion-coefficients-file"
      type: "file"
      source: "module_inputs.inputs.expansion_coefficients_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"
    - name: "gsat-rmses-file"
      type: "file"
      source: "module_inputs.inputs.gsat_rmses_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/module_specific_in"

  # Output file arguments
  outputs:
    - name: "output-gslr-file"
      type: "file"
      source: "module_inputs.outputs.output_gslr_file"
      filename: "gslr.nc"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "output"
        container_path: "/mnt/out"
        transform: "filename"
    - name: "output-lslr-file"
      type: "file"
      source: "module_inputs.outputs.output_lslr_file"
      filename: "lslr.nc"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "output"
        container_path: "/mnt/out"
        transform: "filename"

# Volume specifications (derived from input/output paths)
volumes:
  module_specific_input:
    host_path: "module_inputs.input_paths.module_specific_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/module_specific_in"
  general_input:
    host_path: "module_inputs.input_paths.general_input_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/general_in"
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/out"
  
# Service dependencies are automatically added in generate_compose.py when uses_climate_file: true