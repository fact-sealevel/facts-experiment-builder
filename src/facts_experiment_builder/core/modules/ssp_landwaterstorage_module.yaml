# SSP LANDWATERSTORAGE MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used by the generic module system to generate Docker Compose services.

module_name: "ssp-landwaterstorage"
container_image: "ghcr.io/fact-sealevel/ssp-landwaterstorage:latest"
uses_climate_file: false
climate_file_required: false

# Argument specifications
arguments:
  # Top-level metadata arguments (inherited from experiment metadata)
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      help: "Pipeline ID"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      optional: true
      help: "Number of samples"
    - name: "seed"
      type: "int"
      source: "metadata.seed"
      optional: true
      help: "Random seed to use for sampling"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
      optional: true
      help: "Emissions scenario name"
    - name: "baseyear"
      type: "int"
      source: "metadata.baseyear"
      optional: true
      help: "Base year"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      optional: true
      help: "Projection year start"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      optional: true
      help: "Projection year end"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      optional: true
      help: "Projection year step"

  # Module-specific options
  options:
    - name: "dotriangular"
      type: "bool"
      source: "module_inputs.options.dotriangular"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "dcyear-start"
      type: "int"
      source: "module_inputs.options.dcyear_start"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "dcyear-end"
      type: "int"
      source: "module_inputs.options.dcyear_end"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "dcrate-lo"
      type: "float"
      source: "module_inputs.options.dcrate_lo"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "dcrate-hi"
      type: "float"
      source: "module_inputs.options.dcrate_hi"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      help: "TO DO ADD HELP TEXT"

  # Input file arguments
  inputs:
    - name: "pophist-file"
      type: "file"
      source: "module_inputs.inputs.pophist_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/ssp_lws_in"
    - name: "reservoir-file"
      type: "file"
      source: "module_inputs.inputs.reservoir_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/ssp_lws_in"
    - name: "popscen-file"
      type: "file"
      source: "module_inputs.inputs.popscen_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/ssp_lws_in"
    - name: "gwd-file"
      type: "file"
      source: "module_inputs.inputs.gwd_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/ssp_lws_in"
      multiple: true  # Can be specified multiple times
    - name: "fp-file"
      type: "file"
      source: "module_inputs.inputs.fp_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/ssp_lws_in"
    - name: "location-file"
      type: "file"
      source: "module_inputs.inputs.location_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/ssp_lws_in"

  # Output file arguments
  outputs:
    - name: "output-gslr-file"
      type: "file"
      source: "module_inputs.outputs.output_gslr_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "output"
        container_path: "/mnt/ssp_lws_out"
        transform: "filename"
    - name: "output-lslr-file"
      type: "file"
      source: "module_inputs.outputs.output_lslr_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "output"
        container_path: "/mnt/ssp_lws_out"
        transform: "filename"

# Volume specifications (derived from input/output paths)
volumes:
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/ssp_lws_out"

# No service dependencies (standalone module)