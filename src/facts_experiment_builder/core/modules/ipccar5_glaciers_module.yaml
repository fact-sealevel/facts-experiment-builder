# IPCC AR5 GLACIERS MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used by the generic module system to generate Docker Compose services.

module_name: "ipccar5-glaciers"
container_image: "ghcr.io/fact-sealevel/ipccar5:latest"
uses_climate_file: true
climate_file_required: true
command: "glaciers"  # Specify which command to run

# Argument specifications
arguments:
  # Top-level metadata arguments (inherited from experiment metadata)
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      optional: true
      help: "Pipeline ID"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
      optional: true
      help: "Emissions scenario name"
    - name: "rng-seed"
      type: "int"
      source: "metadata.seed"
      optional: true
      help: "Seed value for random number generator"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      optional: true
      help: "Projection start year"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      optional: true
      help: "Projection end year"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      optional: true
      help: "Projection year step"
    - name: "start-year"
      type: "int"
      source: "metadata.baseyear"
      optional: true
      help: "Year from which to start integrating temperature"

  # Module-specific options
  options:
    - name: "refyear-start"
      type: "int"
      source: "module_inputs.options.refyear_start"
      optional: true
      help: "Start year for reference period"
    - name: "refyear-end"
      type: "int"
      source: "module_inputs.options.refyear_end"
      optional: true
      help: "End year for reference period"
    - name: "end-year"
      type: "int"
      source: "module_inputs.options.end_year"
      optional: true
      help: "Year to end the projection (Used in preprocess)"
    - name: "tlm-flag"
      type: "int"
      source: "module_inputs.options.tlm_flag"
      optional: true
      help: "Use the two-layer model data, 1=yes"
    - name: "use-gmip"
      type: "int"
      source: "module_inputs.options.use_gmip"
      optional: true
      help: "Use the GMIP calibration"
    - name: "nmsamps"
      type: "int"
      source: "module_inputs.options.nmsamps"
      optional: true
      help: "Number of method samples to generate"
    - name: "ntsamps"
      type: "int"
      source: "module_inputs.options.ntsamps"
      optional: true
      help: "Number of climate samples to generate"
    - name: "nsamps"
      type: "int"
      source: "module_inputs.options.nsamps"
      optional: true
      help: "Total number of samples to generate (replaces 'nmsamps' and 'ntsamps' if provided)"
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      help: "Number of locations to process at a time"

  # Input file arguments
  inputs:
    - name: "climate-fname"
      type: "file"
      source: "module_inputs.inputs.climate_fname"
      help: "NetCDF4/HDF5 file containing surface temperature data (this should be a fair output)"
      mount:
        volume: "fair_out"  # Implicit dependency: needs fair output
        container_path: "/mnt/fair_out"
        transform: "filename"
      external_volume: true  # Indicates this comes from an external module
    - name: "glacier-fraction-file"
      type: "file"
      source: "module_inputs.inputs.glacier_fraction_file"
      help: "Path to glacier fraction file"
      mount:
        volume: "input"
        container_path: "/mnt/ipccar5_glaciers_in"
    - name: "fingerprint-dir"
      type: "str"
      source: "module_inputs.inputs.fingerprint_dir"
      help: "Path to fingerprint directory"
      mount:
        volume: "input"
        container_path: "/mnt/ipccar5_glaciers_in"
    - name: "location-file"
      type: "file"
      source: "module_inputs.inputs.location_file"
      help: "File that contains name, id, lat, and lon of points for localization"
      mount:
        volume: "input"
        container_path: "/mnt/ipccar5_glaciers_in"
      optional: true

  # Output file arguments
  outputs:
    - name: "global-output-file"
      type: "file"
      source: "module_inputs.outputs.global_output_file"
      help: "Path to global output sea-level file"
      mount:
        volume: "output"
        container_path: "/mnt/ipccar5_glaciers_out"
        transform: "filename"
    - name: "local-output-file"
      type: "file"
      source: "module_inputs.outputs.local_output_file"
      help: "Path to local output sea-level file"
      mount:
        volume: "output"
        container_path: "/mnt/ipccar5_glaciers_out"
        transform: "filename"
      optional: true

# Volume specifications (derived from input/output paths)
volumes:
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/ipccar5_glaciers_out"
  fair_out:  # External dependency volume
    host_path: "external.temperature_output_dir"  # Passed at runtime
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/fair_out"
    optional: true  # Only added if temperature_output_dir is provided

# Service dependencies are automatically added in generate_compose.py when uses_climate_file: true
