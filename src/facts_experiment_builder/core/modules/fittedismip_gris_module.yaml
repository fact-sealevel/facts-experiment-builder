# FITTEDISMIP GRIS MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used by the generic module system to generate Docker Compose services.

module_name: "fittedismip-gris"
container_image: "ghcr.io/fact-sealevel/fittedismip-gris:v0.1.0"
uses_climate_file: true
climate_file_required: true

# Argument specifications
arguments:
  # Top-level metadata arguments (inherited from experiment metadata)
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      optional: true
      help: "Pipeline ID"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"
      optional: true
      help: "Emissions scenario name"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      optional: true
      help: "Number of samples"
    - name: "rngseed"
      type: "int"
      source: "metadata.seed"
      optional: true
      help: "Random seed to use for sampling"
    - name: "baseyear"
      type: "int"
      source: "metadata.baseyear"
      optional: true
      help: "Base year"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      optional: true
      help: "Projection year start"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      optional: true
      help: "Projection year end"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      optional: true
      help: "Projection year step"

  # Module-specific options
  options:
    - name: "tlm-flag"
      type: "int"
      source: "module_inputs.options.tlm_flag"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "cyear-start"
      type: "int"
      source: "module_inputs.options.cyear_start"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "cyear-end"
      type: "int"
      source: "module_inputs.options.cyear_end"
      optional: true
      help: "TO DO ADD HELP TEXT"
    - name: "chunksize"
      type: "int"
      source: "module_inputs.options.chunksize"
      optional: true
      help: "TO DO ADD HELP TEXT"

  # Input file arguments
  inputs:
    - name: "climate-file"
      type: "file"
      source: "module_inputs.inputs.climate_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "fair_out"  # Implicit dependency: needs fair output
        container_path: "/mnt/fair_out"
        transform: "filename"
      external_volume: true  # Indicates this comes from an external module
    - name: "gris-parm-file"
      type: "file"
      source: "module_inputs.inputs.gris_parm_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/fittedismip_gris_data_input"
    - name: "wais-parm-file"
      type: "file"
      source: "module_inputs.inputs.wais_parm_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/fittedismip_gris_data_input"
    - name: "eais-parm-file"
      type: "file"
      source: "module_inputs.inputs.eais_parm_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/fittedismip_gris_data_input"
    - name: "pen-parm-file"
      type: "file"
      source: "module_inputs.inputs.pen_parm_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/fittedismip_gris_data_input"
    - name: "locationfile"
      type: "file"
      source: "module_inputs.inputs.locationfile"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/fittedismip_gris_data_input"
      optional: true
    - name: "fp-dir"
      type: "str"
      source: "module_inputs.inputs.fp_dir"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/fittedismip_gris_data_input"
      optional: true

  # Output file arguments
  outputs:
    - name: "gris-global-out-file"
      type: "file"
      source: "module_inputs.outputs.gris_global_out_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "output"
        container_path: "/mnt/fittedismip_gris_data_out"
        transform: "filename"
    - name: "gris-local-out-file"
      type: "file"
      source: "module_inputs.outputs.gris_local_out_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "output"
        container_path: "/mnt/fittedismip_gris_data_out"
        transform: "filename"
      optional: true

# Volume specifications (derived from input/output paths)
volumes:
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/fittedismip_gris_data_out"
  fair_out:  # External dependency volume
    host_path: "external.temperature_output_dir"  # Passed at runtime
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/fair_out"
    optional: true  # Only added if temperature_output_dir is provided

# Service dependencies are automatically added in generate_compose.py when uses_climate_file: true
