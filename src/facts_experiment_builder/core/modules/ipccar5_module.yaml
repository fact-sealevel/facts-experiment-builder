# IPCC AR5 GLACIERS MODULE CONFIGURATION
# This YAML file describes the arguments and configuration needed to run the module.
# It is used by the generic module system to generate Docker Compose services.

module_name: "ipccar5"
container_image: "ghcr.io/fact-sealevel/ipccar5-glaciers:latest"  # Update with actual image
uses_climate_file: true
climate_file_required: true

# Argument specifications
arguments:
  # Top-level metadata arguments (inherited from experiment metadata)
  top_level:
    - name: "pipeline-id"
      type: "str"
      source: "metadata.pipeline-id"
      help: "Pipeline ID"
    - name: "nsamps"
      type: "int"
      source: "metadata.nsamps"
      help: "Number of samples"
    - name: "seed"
      type: "int"
      source: "metadata.seed"
      help: "Random seed to use for sampling"
    - name: "scenario"
      type: "str"
      source: "metadata.scenario"
      transform: "scenario_name"  # Extract from ScenarioConfig object
      help: "Emissions scenario name"
    - name: "pyear-start"
      type: "int"
      source: "metadata.pyear_start"
      help: "Projection year start"
    - name: "pyear-end"
      type: "int"
      source: "metadata.pyear_end"
      help: "Projection year end"
    - name: "pyear-step"
      type: "int"
      source: "metadata.pyear_step"
      help: "Projection year step"
    - name: "baseyear"
      type: "int"
      source: "metadata.baseyear"
      help: "Base year"
  
  # Module-specific options
  options:
    - name: "gmip"
      type: "int"
      source: "module_inputs.options.gmip"
      help: "TO DO ADD HELP TEXT"
    - name: "nmsamps"
      type: "int"
      source: "module_inputs.options.nmsamps"
      optional: true  # Optional parameter
      help: "TO DO ADD HELP TEXT"
    - name: "ntsamps"
      type: "int"
      source: "module_inputs.options.ntsamps"
      optional: true  # Optional parameter
      help: "TO DO ADD HELP TEXT"
  
  # Input file arguments
  inputs:
    - name: "glacier-fraction-file"
      type: "file"
      source: "module_inputs.inputs.ipccar5_glaciers_fraction_file"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "input"
        container_path: "/mnt/ipccar5_glaciers_in"
    - name: "climate-fname"
      type: "file"
      source: "module_inputs.inputs.climate_fname"
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "fair_out"  # Implicit dependency: needs fair output
        container_path: "/mnt/fair_out"
        transform: "filename"
      external_volume: true  # Indicates this comes from an external module
  
  # Output file arguments
  outputs:
    - name: "global-output-file"
      type: "file"
      source: "module_inputs.outputs.output_0"  # First output (gslr)
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "output"
        container_path: "/mnt/ipccar5_glaciers_out"
        transform: "filename"
    - name: "local-output-file"
      type: "file"
      source: "module_inputs.outputs.output_1"  # Second output (lslr) if exists
      help: "TO DO ADD HELP TEXT"
      mount:
        volume: "output"
        container_path: "/mnt/ipccar5_glaciers_out"
        transform: "filename"
      optional: true

# Volume specifications (derived from input/output paths)
volumes:
  output:
    host_path: "module_inputs.output_paths.output_dir"
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/ipccar5_glaciers_out"
  fair_out:  # External dependency volume
    host_path: "external.temperature_output_dir"  # Passed at runtime
    help: "TO DO ADD HELP TEXT"
    container_path: "/mnt/fair_out"
    optional: true  # Only added if temperature_output_dir is provided

# Service dependencies are automatically added in generate_compose.py when uses_climate_file: true
