site_name: facts-experiment-builder
site_description: CLI tool for configuring and managing FACTS v2 sea-level rise experiments
site_url: https://fact-sealevel.github.io/facts-experiment-builder
repo_url: https://github.com/fact-sealevel/facts-experiment-builder
repo_name: fact-sealevel/facts-experiment-builder

extra_css:
  - stylesheets/lapaz.css

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - User Guide:
    - Overview: user-guide/overview.md
    - setup-new-experiment: user-guide/setup-new-experiment.md
    - generate-compose: user-guide/generate-compose.md
    - list-modules: user-guide/list-modules.md
    - experiment-metadata.yml: user-guide/experiment-metadata.md
    - Available Modules: user-guide/modules.md
  - Contributing:
    - Overview: contributing/overview.md
    - Adding a Module: contributing/adding-a-module.md
    - Module YAML Reference: contributing/module-yaml-reference.md
    - Modifying the Builder:
      - Architecture: reference/architecture.md
      - Command Flow: reference/command_flow.md
