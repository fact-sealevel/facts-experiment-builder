name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check

      - name: Lint
        run: uv run ruff check

      - name: Run tests
        run: uv run pytest tests/unit/ --ignore=tests/unit/test_module_name_validation.py -v --color=yes
